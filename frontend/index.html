<!doctype html>
<html lang="cs" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jednoduchý český CRM pro malé prodejní týmy. ARES integrace, automatické uvolňování firem, 30 dní zdarma. Bez zbytečností."
    />
    <meta name="theme-color" content="#0A0A0B" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SimpleCRM — CRM pro prodej. Nic víc, nic míň." />
    <meta
      property="og:description"
      content="Jednoduchý český CRM pro malé prodejní týmy. ARES integrace, automatické uvolňování firem, 30 dní zdarma."
    />
    <meta property="og:locale" content="cs_CZ" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>SimpleCRM — CRM pro prodej. Nic víc, nic míň.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted or system-preferred theme before paint to avoid flash.
      (function () {
        try {
          var saved = localStorage.getItem("simplecrm-theme");
          var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
          var theme = saved || (prefersLight ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", theme);
        } catch {
          /* ignore; default data-theme="dark" stays */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
