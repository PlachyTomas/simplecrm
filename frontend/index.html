<!doctype html>
<html lang="cs" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jednoduchý český CRM pro malé prodejní týmy. ARES integrace, automatické uvolňování firem, 30 dní zdarma. Bez zbytečností."
    />
    <meta name="theme-color" content="#0A0A0B" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SimpleCRM — CRM pro prodej. Nic víc, nic míň." />
    <meta
      property="og:description"
      content="Jednoduchý český CRM pro malé prodejní týmy. ARES integrace, automatické uvolňování firem, 30 dní zdarma."
    />
    <meta property="og:locale" content="cs_CZ" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>SimpleCRM — CRM pro prodej. Nic víc, nic míň.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted or system-preferred theme before paint to avoid
      // FOUC. Three persisted values: "light" | "dark" | "system" (default).
      // The matching React hook lives in src/lib/theme.ts and keeps localStorage
      // in sync.
      (function () {
        try {
          var raw = localStorage.getItem("simplecrm-theme");
          var pref = raw === "light" || raw === "dark" ? raw : "system";
          var dark =
            pref === "dark" ||
            (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var theme = dark ? "dark" : "light";
          var root = document.documentElement;
          root.setAttribute("data-theme", theme);
          root.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0A0A0B" : "#FAFAFB");
        } catch (_) {
          /* default data-theme="dark" stays */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
