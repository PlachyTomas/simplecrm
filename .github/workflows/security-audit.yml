name: security-audit

# Weekly dependency-advisory sweep (supply-chain audit 2026-07). Scheduled so
# a new advisory against pinned versions surfaces without a human remembering
# to run audits. Does NOT block CI — it runs on a cron, and failure means
# "there is a new advisory to look at", not "the branch is broken".

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    name: pip-audit (uv.lock)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Audit locked dependencies
        run: |
          uv export --format requirements-txt --no-emit-project --all-groups --no-hashes -o /tmp/reqs.txt
          uv tool run pip-audit --no-deps -r /tmp/reqs.txt

  npm-audit:
    name: pnpm audit (pnpm-lock.yaml)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "11"

      - name: Audit lockfile
        run: pnpm audit
